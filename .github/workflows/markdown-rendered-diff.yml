name: Markdown rendered diff

on:
  pull_request:
    paths:
      - "**/*.md"

jobs:
  rendered-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Build rendered diff
        run: |
          mkdir -p preview

          git show origin/${{ github.base_ref }}:waict-integrity.md > preview/base.md
          cp waict-integrity.md preview/pr.md

          npx --yes marked preview/base.md -o preview/base.html
          npx --yes marked preview/pr.md -o preview/pr.html

          npx --yes diff2html-cli -i file -s side -F preview/rendered-diff.html -- \
            <(git diff --no-index preview/base.html preview/pr.html || true)

      - name: Upload rendered diff
        uses: actions/upload-artifact@v4
        with:
          name: rendered-markdown-diff
          path: preview/
