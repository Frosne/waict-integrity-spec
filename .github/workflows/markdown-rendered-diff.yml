name: Markdown rendered diff

on:
  pull_request:
    paths:
      - "**/*.md"

jobs:
  rendered-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate preview
        run: |
          mkdir -p preview

          # Fetch base branch
          git fetch origin ${{ github.base_ref }} 2>/dev/null || true

          # Get base version
          git show origin/${{ github.base_ref }}:waict-integrity.md > preview/base.md 2>/dev/null || echo "# NEW FILE" > preview/base.md

          # Get PR version
          cp waict-integrity.md preview/pr.md

          # Convert both to HTML (marked needs -i/-o; it reads stdin otherwise)
          npx --yes marked -i preview/base.md -o preview/base.html
          npx --yes marked -i preview/pr.md -o preview/pr.html

          # Template for the side-by-side comparison, with placeholders
          cat > preview/template.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Markdown Diff</title>
            <style>
              body { font-family: sans-serif; margin: 20px; }
              .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
              .section { border: 1px solid #ddd; padding: 20px; overflow: auto; max-height: 80vh; }
              h1 { color: #333; border-bottom: 2px solid #007bff; }
              .base { background: #f8f9fa; }
              .pr { background: #fff; }
            </style>
          </head>
          <body>
            <h1>📄 Markdown Diff Preview</h1>
            <div class="container">
              <div class="section base">
                <h2>Base (main branch)</h2>
                <div id="base-content">__BASE_CONTENT__</div>
              </div>
              <div class="section pr">
                <h2>PR Changes</h2>
                <div id="pr-content">__PR_CONTENT__</div>
              </div>
            </div>
          </body>
          </html>
          EOF

          # Inline the rendered HTML into the template (avoids fetch()/CORS issues on file://)
          node -e "
            const fs = require('fs');
            let template = fs.readFileSync('preview/template.html', 'utf8');
            const base = fs.readFileSync('preview/base.html', 'utf8');
            const pr = fs.readFileSync('preview/pr.html', 'utf8');
            template = template.replace('__BASE_CONTENT__', base).replace('__PR_CONTENT__', pr);
            fs.writeFileSync('preview/rendered-diff.html', template);
          "

          rm preview/template.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-preview
          path: preview/

      - name: Comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Markdown Preview Generated**\n\nDownload the `markdown-preview` artifact from the Actions tab and open `rendered-diff.html` in your browser to see the side-by-side comparison of the rendered markdown.'
            })
