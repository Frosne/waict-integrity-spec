name: Markdown rendered diff

on:
  pull_request:
    paths:
      - "**/*.md"

jobs:
  rendered-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build rendered Markdown diff
        shell: bash
        run: |
          set -e

          mkdir -p preview

          git fetch origin "${{ github.base_ref }}"

          git show "origin/${{ github.base_ref }}:waict-integrity.md" > preview/base.md
          cp waict-integrity.md preview/pr.md

          npx --yes marked-cli preview/base.md -o preview/base.html
          npx --yes marked-cli preview/pr.md -o preview/pr.html

          git diff --no-index preview/base.html preview/pr.html > preview/rendered.diff || true

          npx --yes diff2html-cli \
            -i file \
            -s side \
            -F preview/rendered-diff.html \
            -- preview/rendered.diff

          test -f preview/rendered-diff.html

      - name: Upload rendered diff artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-markdown-diff
          path: preview/
